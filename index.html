<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdLog Pro</title>
    <style>
        :root {
            --apple-bg: #F5F5F7;
            --apple-card: #FFFFFF;
            --apple-accent: #0071E3;
            --apple-text: #1D1D1F;
            --apple-gray: #86868B;
            --apple-border: #D2D2D7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            margin: 0; padding: 40px 20px;
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 800px; }
        
        header { margin-bottom: 40px; }
        h1 { font-size: 32px; font-weight: 600; margin: 0; letter-spacing: -0.8px; }
        p { color: var(--apple-gray); margin-top: 8px; }

        .card {
            background: var(--apple-card);
            padding: 32px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }

        label {
            display: block; font-size: 13px; font-weight: 600;
            color: var(--apple-gray); margin-bottom: 8px;
        }

        input, select, textarea {
            width: 100%; padding: 14px;
            border: 1px solid var(--apple-border);
            border-radius: 12px; font-size: 16px;
            background: #FBFBFD;
            box-sizing: border-box; outline: none;
            transition: all 0.2s ease;
        }

        input:focus, select:focus { border-color: var(--apple-accent); background: white; }

        .tag-group { margin-top: 24px; }
        .tag-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        
        .tag {
            padding: 8px 16px; background: #F2F2F7;
            border-radius: 20px; font-size: 14px;
            cursor: pointer; transition: all 0.2s;
            border: 1px solid transparent;
        }

        .tag.active { background: var(--apple-accent); color: white; }

        .btn-save {
            width: 100%; background: var(--apple-accent); color: white;
            border: none; padding: 18px; border-radius: 14px;
            font-size: 17px; font-weight: 600; cursor: pointer;
            margin-top: 32px; transition: transform 0.1s;
        }

        .btn-save:active { transform: scale(0.98); }
        
        #status {
            text-align: center; margin-top: 16px; font-size: 14px;
            color: var(--apple-accent); display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AdLog Pro</h1>
        <p>Präzise Dokumentation für Werbekonten</p>
    </header>

    <div class="card">
        <div class="grid">
            <div>
                <label>Datum</label>
                <input type="date" id="date">
            </div>
            <div>
                <label>Plattform</label>
                <select id="platform">
                    <option>Google Ads</option>
                    <option>Microsoft Advertising</option>
                    <option>LinkedIn Ads</option>
                    <option>Meta Ads</option>
                </select>
            </div>
            <div>
                <label>Werbekonto</label>
                <select id="account">
                    <option>Cargo International</option>
                    <option>SimpleLogistik</option>
                </select>
            </div>
            <div>
                <label>Kampagne</label>
                <input type="text" id="campaign" placeholder="z.B. DE_Search_Brand">
            </div>
        </div>

        <label>Änderungsbeschreibung</label>
        <textarea id="description" rows="3" placeholder="Was wurde geändert?"></textarea>

        <div style="margin-top: 20px;">
            <label>Notizen / Effekte</label>
            <textarea id="notes" rows="2" placeholder="Optionale Beobachtungen..."></textarea>
        </div>

        <div class="tag-group">
            <label>Tags</label>
            <div class="tag-list" id="tagList">
                </div>
        </div>

        <button class="btn-save" onclick="sendData()">Änderung speichern</button>
        <div id="status">Verbindung zum Sheet wird hergestellt...</div>
    </div>
</div>

<script>
    // Konfiguration (Hier kannst du Tags einfach im Code ändern)
    const availableTags = ['Budget', 'Zielgruppe', 'Creative', 'Bidding', 'Keywords', 'Ausschlüsse'];
    let selectedTags = [];

    // Setup
    document.getElementById('date').valueAsDate = new Date();
    const tagContainer = document.getElementById('tagList');
    
    availableTags.forEach(t => {
        const span = document.createElement('span');
        span.className = 'tag';
        span.innerText = t;
        span.onclick = () => {
            span.classList.toggle('active');
            if(selectedTags.includes(t)) selectedTags = selectedTags.filter(i => i !== t);
            else selectedTags.push(t);
        };
        tagContainer.appendChild(span);
    });

    async function sendData() {
        const btn = document.querySelector('.btn-save');
        const status = document.getElementById('status');
        
        const payload = {
            date: document.getElementById('date').value,
            platform: document.getElementById('platform').value,
            account: document.getElementById('account').value,
            campaign: document.getElementById('campaign').value,
            description: document.getElementById('description').value,
            notes: document.getElementById('notes').value,
            tags: selectedTags.join(', ')
        };

        if(!payload.description) return alert("Bitte eine Beschreibung eingeben.");

        btn.disabled = true;
        btn.innerText = "Speichert...";
        status.style.display = "block";

        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwawA5UnJ-6_k9ajA9TAroTgt2qTslQXzJBNkrAWRF6VbiCl7mirkISGpdDD3fcIblb/exec"; // <--- HIER DEINE URL EINSETZEN

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            alert("Erfolgreich geloggt!");
            location.reload(); // Seite neu laden für nächsten Eintrag
        } catch (e) {
            alert("Fehler: " + e);
            btn.disabled = false;
            btn.innerText = "Erneut versuchen";
        }
    }
</script>

</body>
</html>
